services:
  factorio:
    build: .
    ports:
      - "34197:34197/udp"
      - "27015:27015/tcp"
    volumes:
      - ./config:/factorio/config
    environment:
      - FACTORIO_SERVER_NAME=Factorio Speedrun Server
      - FACTORIO_RCON_PASSWORD=changeme
      - RESET_SCHEDULE=WED:06:00,FRI:19:00,MON:06:00
      - RESET_GAME_HOURS=30
      - SERVER_MODE=achievement
    restart: unless-stopped
