name: Build and Push Factorio Docker Image

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest Factorio stable version
        id: version
        run: |
          LATEST=$(curl -s https://factorio.com/api/latest-releases | jq -r '.stable.headless')
          CURRENT=$(cat VERSION)
          echo "latest=${LATEST}" >> $GITHUB_OUTPUT
          echo "current=${CURRENT}" >> $GITHUB_OUTPUT
          if [ "${LATEST}" != "${CURRENT}" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Update VERSION file
        if: steps.version.outputs.updated == 'true'
        run: echo "${{ steps.version.outputs.latest }}" > VERSION

      - name: Commit version update
        if: steps.version.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump factorio to ${{ steps.version.outputs.latest }}"
          git push

      - name: Set up Docker Buildx
        if: steps.version.outputs.updated == 'true' || github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.version.outputs.updated == 'true' || github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        if: steps.version.outputs.updated == 'true' || github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: FACTORIO_VERSION=${{ steps.version.outputs.latest || steps.version.outputs.current }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dockerio:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dockerio:${{ steps.version.outputs.latest || steps.version.outputs.current }}

      - name: Deploy to GCP
        if: steps.build.outcome == 'success'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key deploy@${{ secrets.GCP_HOST }} "\
            cd /home/hackerman/Dockerio && \
            git pull origin main && \
            sudo docker compose pull && \
            sudo docker compose down && \
            sudo docker compose up -d"
